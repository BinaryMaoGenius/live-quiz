<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Écran Public</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px;
        }

        .screen-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .current-question {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .question-content {
            width: 100%;
        }

        .question-text {
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #333;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .option {
            background: #f8f9fa;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            font-size: 1.2em;
            transition: all 0.3s;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            animation: pulse 0.5s ease-out;
        }

        .timer-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 20px;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 100%;
            transition: width 0.1s linear;
        }

        .leaderboard {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .leaderboard h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #667eea;
        }

        .leaderboard-grid {
            display: grid;
            gap: 10px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 1.1em;
        }

        .leaderboard-item.top-1 {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            font-size: 1.2em;
            font-weight: bold;
        }

        .leaderboard-item.top-2 {
            background: linear-gradient(135deg, #c0c0c0 0%, #e0e0e0 100%);
        }

        .leaderboard-item.top-3 {
            background: linear-gradient(135deg, #cd7f32 0%, #e0a878 100%);
        }

        .rank {
            font-weight: bold;
            font-size: 1.2em;
            width: 50px;
        }

        .pseudo {
            flex: 1;
            margin-left: 20px;
        }

        .score {
            font-weight: bold;
            font-size: 1.2em;
        }

        .waiting-message {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .answer-stats {
            margin-top: 20px;
            font-size: 1.1em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="screen-container">
        <div class="header">
            <h1>🎮 Quiz Challenge</h1>
            <p>ID de la partie: <strong id="gameId"></strong></p>
        </div>

        <div id="waitingMessage" class="waiting-message">
            <div class="spinner"></div>
            <h2>En attente du début du quiz...</h2>
            <p>Scannez le QR code pour participer !</p>
        </div>

        <div id="quizContent" style="display: none;">
            <div class="current-question" id="currentQuestion">
                <div class="question-content">
                    <div class="question-text" id="questionText"></div>
                    <div class="options" id="options"></div>
                    <div class="timer-bar">
                        <div class="timer-progress" id="timerProgress"></div>
                    </div>
                    <div class="answer-stats" id="answerStats"></div>
                </div>
            </div>

            <div class="leaderboard">
                <h2>🏆 Classement en direct</h2>
                <div class="leaderboard-grid" id="leaderboard"></div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let gameId;
        let timerInterval = null;

        gameId = window.location.pathname.split('/')[2];
        document.getElementById('gameId').innerText = gameId;

        socket = io();
        socket.emit('join-game', { gameId, pseudo: 'Screen', avatar: '📺' });

        socket.on('game-started', () => {
            document.getElementById('waitingMessage').style.display = 'none';
            document.getElementById('quizContent').style.display = 'block';
        });

        socket.on('new-question', (data) => {
            displayQuestion(data.question, data.questionNumber, data.totalQuestions);
            startTimer(data.question.timeLimit);
        });

        socket.on('question-end', (data) => {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            const correctAnswer = data.correctAnswer;
            document.querySelectorAll('.option').forEach(opt => {
                if (opt.textContent.includes(correctAnswer)) {
                    opt.classList.add('correct');
                }
            });
            document.getElementById('answerStats').innerHTML = `
                <p>✅ Temps écoulé ! La bonne réponse était : ${correctAnswer}</p>
            `;
        });

        socket.on('leaderboard-update', (scores) => {
            updateLeaderboard(scores);
        });

        socket.on('quiz-end', (data) => {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            document.getElementById('answerStats').innerHTML = `
                <p>🎉 Quiz terminé ! Félicitations à tous ! 🎉</p>
            `;
        });

        function displayQuestion(question, num, total) {
            document.getElementById('questionText').innerHTML = `
                <strong>Question ${num}/${total}</strong><br>
                ${question.text}
                ${question.image ? `<br><img src="${question.image}" style="max-width: 60%; margin-top: 20px;">` : ''}
            `;
            
            const optionsHtml = question.options.map((opt, idx) => `
                <div class="option">
                    <strong>${String.fromCharCode(65+idx)}.</strong> ${opt}
                </div>
            `).join('');
            
            document.getElementById('options').innerHTML = optionsHtml;
            document.getElementById('answerStats').innerHTML = '';
            
            // Enlever la classe correct de toutes les options
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('correct');
            });
        }

        function startTimer(seconds) {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            let timeLeft = seconds;
            const progressBar = document.getElementById('timerProgress');
            
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    return;
                }
                const progress = (timeLeft / seconds) * 100;
                progressBar.style.width = `${progress}%`;
                timeLeft--;
            }, 1000);
        }

        function updateLeaderboard(scores) {
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            const top3 = sorted.slice(0, 10); // Afficher top 10
            
            const html = top3.map(([pseudo, score], idx) => {
                let rankClass = '';
                if (idx === 0) rankClass = 'top-1';
                else if (idx === 1) rankClass = 'top-2';
                else if (idx === 2) rankClass = 'top-3';
                
                return `
                    <div class="leaderboard-item ${rankClass}">
                        <div class="rank">${idx + 1}</div>
                        <div class="pseudo">${pseudo}</div>
                        <div class="score">⭐ ${score} pts</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('leaderboard').innerHTML = html || '<p>Aucun score pour le moment</p>';
        }
    </script>
</body>
</html>
