<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Day 2026 - Main Stage</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --background: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: white;
            min-height: 100vh;
            overflow: hidden;
            padding: 4vw;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 10% 10%, #1e1b4b 0%, #020617 100%);
            z-index: -1;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
            height: calc(100vh - 8vw);
        }

        @media (max-width: 1200px) {
            .layout {
                grid-template-columns: 1fr;
                height: auto;
                overflow-y: auto;
            }
            body { overflow-y: auto; }
            .main-card { min-height: 500px; }
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 3rem;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .main-card { padding: 2rem; border-radius: 2rem; }
            .q-text { font-size: 2rem; }
            .options-grid { grid-template-columns: 1fr; }
            .big-title { font-size: 3rem; }
        }

        .header {
            margin-bottom: 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-box {
            display: flex;
            flex-direction: column;
        }

        .logo-box .badge {
            font-size: 0.75rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .logo-box h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
        }

        .game-id-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: #94a3b8;
            border: 1px solid var(--glass-border);
        }

        .question-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .q-meta {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .q-text {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 3rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .opt-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 1.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .opt-card.correct {
            background: #10b981;
            border-color: #10b981;
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.4);
        }

        .opt-letter {
            width: 3.5rem;
            height: 3.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: var(--primary);
        }

        .opt-card.correct .opt-letter {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .timer-strip {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 8px;
            background: var(--primary);
            width: 100%;
            transition: width 1s linear;
        }

        .leaderboard-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 3rem;
            padding: 4rem;
            display: flex;
            flex-direction: column;
        }

        .leaderboard-card h2 {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2.5rem;
            color: #94a3b8;
        }

        .lb-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .lb-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 1.25rem 2rem;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: all 0.5s;
        }

        .lb-item.top-1 {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2), transparent);
            border-color: rgba(59, 130, 246, 0.3);
            transform: scale(1.05) translateX(10px);
        }

        .lb-rank {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary);
            width: 40px;
        }

        .lb-pseudo {
            font-size: 1.5rem;
            font-weight: 700;
            flex: 1;
            margin-left: 1rem;
        }

        .lb-score {
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
        }

        .waiting-full {
            grid-column: span 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .qr-area {
            background: white;
            padding: 2rem;
            border-radius: 2rem;
            margin-bottom: 3rem;
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.3);
        }

        .qr-area img {
            width: 300px;
            height: 300px;
        }

        .big-badge {
            font-size: 1rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 0.5em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .big-title {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="layout" id="mainLayout">
        <div id="waitingScreen" class="waiting-full">
            <div class="big-badge">Digital Day 2026</div>
            <h1 class="big-title">PRÊTS POUR LE CHALLENGE ?</h1>
            <div class="qr-area" id="qrContainer">
                <!-- QR Code dynamically injected by Admin if needed, or we show a generic wait -->
                <div style="font-size: 8rem;">🎮</div>
            </div>
            <p style="font-size: 1.5rem; color: #94a3b8; font-weight: 600;">Scannez le QR Code sur l'écran de l'animateur<br>ID Partie: <span id="gameIdDisplay" style="color: white;">----</span></p>
        </div>

        <div id="activeQuiz" style="display: none; contents;">
            <div class="main-card">
                <div class="header">
                    <div class="logo-box">
                        <span class="badge">Digital Day 2026</span>
                        <h1>ARENA QUIZ</h1>
                    </div>
                    <div class="game-id-tag" id="gameIdTag">----</div>
                </div>

                <div class="question-box">
                    <div class="q-meta" id="qNum">Question 1/10</div>
                    <div class="q-text" id="qText">Chargement de la question...</div>
                    <div class="options-grid" id="options">
                        <!-- Options injected -->
                    </div>
                </div>
                
                <div class="timer-strip" id="timerStrip"></div>
            </div>

            <div class="leaderboard-card">
                <h2>CLASSEMENT LIVE</h2>
                <div class="lb-list" id="lbList">
                    <!-- Leaderboard injected -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let gameId;
        
        gameId = window.location.pathname.split('/')[2];
        document.getElementById('gameIdDisplay').innerText = gameId;
        document.getElementById('gameIdTag').innerText = gameId;

        socket = io();
        socket.emit('join-game', { gameId, pseudo: 'Screen', avatar: '📺' });

        socket.on('game-started', () => {
            document.getElementById('waitingScreen').style.display = 'none';
            document.getElementById('activeQuiz').style.display = 'grid';
        });

        socket.on('new-question', (data) => {
            displayQuestion(data.question, data.questionNumber, data.totalQuestions);
            startTimer(data.question.timeLimit);
        });

        socket.on('question-end', (data) => {
            const correctAnswer = data.correctAnswer;
            document.querySelectorAll('.opt-card').forEach(opt => {
                if (opt.querySelector('.opt-label').innerText === correctAnswer) {
                    opt.classList.add('correct');
                }
            });
        });

        socket.on('leaderboard-update', (scores) => updateLeaderboard(scores));

        function displayQuestion(q, num, total) {
            document.getElementById('qNum').innerText = `Question ${num}/${total}`;
            document.getElementById('qText').innerText = q.text;
            
            const html = q.options.map((opt, idx) => `
                <div class="opt-card">
                    <div class="opt-letter">${String.fromCharCode(65+idx)}</div>
                    <div class="opt-label">${opt}</div>
                </div>
            `).join('');
            
            document.getElementById('options').innerHTML = html;
        }

        function startTimer(seconds) {
            const strip = document.getElementById('timerStrip');
            strip.style.transition = 'none';
            strip.style.width = '100%';
            
            setTimeout(() => {
                strip.style.transition = `width ${seconds}s linear`;
                strip.style.width = '0%';
            }, 50);
        }

        function updateLeaderboard(scores) {
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            const top5 = sorted.slice(0, 5);
            
            const html = top5.map(([pseudo, score], idx) => `
                <div class="lb-item ${idx === 0 ? 'top-1' : ''}">
                    <div class="lb-rank">#${idx + 1}</div>
                    <div class="lb-pseudo">${pseudo}</div>
                    <div class="lb-score">${score}</div>
                </div>
            `).join('');
            
            document.getElementById('lbList').innerHTML = html || '<p>En attente des scores...</p>';
        }
    </script>
</body>
</html>
