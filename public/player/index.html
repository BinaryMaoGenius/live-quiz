<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Day 2026 - Live Quiz</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --background: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Ambient Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-text {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--primary);
            margin-bottom: 0.5rem;
            display: block;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        /* Registration Form */
        .input-group {
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }

        .avatar-opt {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .avatar-opt:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .avatar-opt.selected {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            transform: scale(1.05);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 1.25rem;
            border-radius: 1rem;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -10px rgba(59, 130, 246, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Quiz Area */
        .quiz-area { display: none; }

        .timer-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            width: 100%;
            transition: width 1s linear;
        }

        .question-meta {
            font-size: 0.75rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 2rem;
        }

        .options-grid {
            display: grid;
            gap: 1rem;
        }

        .option-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
            padding: 1.25rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option-card:hover:not(.disabled) {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            transform: translateX(8px);
        }

        .option-card.selected {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.3);
        }

        .option-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .option-letter {
            width: 2.5rem;
            height: 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.875rem;
            color: var(--primary);
        }

        .option-card.selected .option-letter {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Leaderboard in player view */
        .mini-leaderboard {
            margin-top: 3rem;
            border-top: 1px solid var(--glass-border);
            padding-top: 2rem;
        }

        .mini-leaderboard h3 {
            font-size: 0.875rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
        }

        .lb-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            font-size: 0.9375rem;
        }

        .lb-rank {
            color: var(--primary);
            font-weight: 900;
            width: 1.5rem;
        }

        .lb-pseudo { font-weight: 600; flex: 1; margin-left: 0.5rem; }
        .lb-score { font-weight: 800; color: #94a3b8; }

        /* Notifications */
        .notif {
            position: fixed;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            padding: 1.25rem;
            border-radius: 1.25rem;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: translateY(-150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .notif.show { transform: translateY(0); }
        .notif.success { border-left: 4px solid #10b981; }
        .notif.error { border-left: 4px solid #ef4444; }

        .waiting-screen {
            text-align: center;
            padding: 3rem 0;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s infinite linear;
            margin: 0 auto 2rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .glass-card { padding: 1.5rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div id="notification" class="notif"></div>

    <div class="container">
        <div class="glass-card">
            <div class="header">
                <span class="logo-text">Digital Day 2026</span>
                <h1>ARENA QUIZ</h1>
            </div>

            <!-- Inscription -->
            <div id="registration">
                <div class="input-group">
                    <input type="text" id="pseudo" placeholder="Comment t'appelles-tu ?" maxlength="15">
                </div>
                
                <div class="avatar-grid" id="avatarSelector">
                    <div class="avatar-opt" data-avatar="🚀">🚀</div>
                    <div class="avatar-opt" data-avatar="🦸">🦸</div>
                    <div class="avatar-opt" data-avatar="⚡">⚡</div>
                    <div class="avatar-opt" data-avatar="🛡️">🛡️</div>
                    <div class="avatar-opt" data-avatar="🐱">🐱</div>
                    <div class="avatar-opt" data-avatar="🧠">🧠</div>
                </div>

                <button class="btn-primary" onclick="joinGame()">Lancer le défi</button>
            </div>

            <!-- Attente -->
            <div id="waitingMessage" class="waiting-screen" style="display: none;">
                <div class="loader"></div>
                <h3 style="margin-bottom: 0.5rem;">C'est prêt !</h3>
                <p style="color: #64748b; font-size: 0.875rem;">Tiens-toi prêt, l'animateur va lancer la partie...</p>
            </div>

            <!-- Quiz -->
            <div id="quizArea" class="quiz-area">
                <div class="timer-bar">
                    <div id="timerProgress" class="timer-progress"></div>
                </div>
                
                <div class="question-meta" id="qCounter">Question 1/10</div>
                <div class="question-text" id="questionText">Chargement de la question...</div>
                
                <div class="options-grid" id="options">
                    <!-- Les options s'insèrent ici -->
                </div>

                <div class="mini-leaderboard">
                    <h3>Classement Live <span id="myRank">#--</span></h3>
                    <div id="leaderboardList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let gameId;
        let playerInfo = null;
        let canAnswer = false;

        gameId = window.location.pathname.split('/')[2];

        function showNotification(message, type = 'success') {
            const el = document.getElementById('notification');
            el.innerHTML = message;
            el.className = `notif show ${type}`;
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        function joinGame() {
            const pseudo = document.getElementById('pseudo').value.trim();
            const selectedAvatar = document.querySelector('.avatar-opt.selected');
            const avatar = selectedAvatar ? selectedAvatar.getAttribute('data-avatar') : '🚀';
            
            if (!pseudo) {
                showNotification('Veuillez entrer un pseudo', 'error');
                return;
            }
            
            socket = io();
            
            socket.on('connect', () => {
                socket.emit('join-game', { gameId, pseudo, avatar });
            });
            
            socket.on('error', (msg) => showNotification(msg, 'error'));
            
            socket.on('joined', (data) => {
                playerInfo = data;
                document.getElementById('registration').style.display = 'none';
                document.getElementById('waitingMessage').style.display = 'block';
                showNotification(`Prêt, ${pseudo} !`);
            });
            
            socket.on('game-started', () => {
                document.getElementById('waitingMessage').style.display = 'none';
                document.getElementById('quizArea').style.display = 'block';
            });
            
            socket.on('new-question', (data) => {
                displayQuestion(data.question, data.questionNumber, data.totalQuestions);
                canAnswer = true;
                resetTimer(data.question.timeLimit);
            });
            
            socket.on('answer-result', (result) => {
                if (result.correct) {
                    showNotification(`⚡ +${result.points} pts !`, 'success');
                } else {
                    showNotification(`❌ Dommage !`, 'error');
                }
                canAnswer = false;
            });
            
            socket.on('leaderboard-update', (scores) => updateLeaderboard(scores));
            
            socket.on('question-end', (data) => {
                canAnswer = false;
                if (data.timeUp) showNotification('⏰ Temps écoulé !', 'error');
            });
            
            socket.on('quiz-end', () => showNotification('🏁 Quiz terminé !', 'success'));
            socket.on('game-reset', () => location.reload());
        }

        function displayQuestion(q, num, total) {
            document.getElementById('qCounter').innerText = `Question ${num}/${total}`;
            document.getElementById('questionText').innerText = q.text;
            
            const html = q.options.map((opt, idx) => `
                <div class="option-card" id="opt-${idx}" onclick="submitAnswer(${idx})">
                    <div class="option-letter">${String.fromCharCode(65+idx)}</div>
                    <div class="option-label">${opt}</div>
                </div>
            `).join('');
            
            document.getElementById('options').innerHTML = html;
        }

        function resetTimer(seconds) {
            const progress = document.getElementById('timerProgress');
            progress.style.transition = 'none';
            progress.style.width = '100%';
            
            setTimeout(() => {
                progress.style.transition = `width ${seconds}s linear`;
                progress.style.width = '0%';
            }, 50);
        }

        function submitAnswer(idx) {
            if (!canAnswer) return;
            
            canAnswer = false;
            socket.emit('submit-answer', { gameId, answer: idx });
            
            document.getElementById(`opt-${idx}`).classList.add('selected');
            document.querySelectorAll('.option-card').forEach(el => el.classList.add('disabled'));
        }

        function updateLeaderboard(scores) {
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            const myRank = sorted.findIndex(s => s[0] === playerInfo?.pseudo) + 1;
            if (myRank > 0) document.getElementById('myRank').innerText = `#${myRank}`;

            const html = sorted.slice(0, 5).map(([pseudo, score], idx) => `
                <div class="lb-row">
                    <span class="lb-rank">${idx + 1}</span>
                    <span class="lb-pseudo">${pseudo}</span>
                    <span class="lb-score">${score} pts</span>
                </div>
            `).join('');
            
            document.getElementById('leaderboardList').innerHTML = html || '<p>En attente...</p>';
        }

        // Init avatars
        document.querySelectorAll('.avatar-opt').forEach(avatar => {
            avatar.addEventListener('click', () => {
                document.querySelectorAll('.avatar-opt').forEach(a => a.classList.remove('selected'));
                avatar.classList.add('selected');
            });
        });
        document.querySelector('.avatar-opt').classList.add('selected');
    </script>
</body>
</html>
