<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Day 2026 - Console Admin</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --background: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: white;
            min-height: 100vh;
            padding: 2rem;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 100% 0%, #1e1b4b 0%, #020617 100%);
            z-index: -1;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 2rem;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        .game-id {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-weight: 800;
            font-family: monospace;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            font-weight: 700;
        }

        .btn {
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 800;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }

        .controls { display: flex; gap: 1rem; margin-bottom: 2rem; }

        .qr-section {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 1.5rem;
            margin-top: 2rem;
        }

        .qr-section img { width: 180px; height: 180px; }

        .player-list, .lb-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .row-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border-radius: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--glass-border);
        }

        .q-preview {
            background: rgba(59, 130, 246, 0.05);
            padding: 1.5rem;
            border-radius: 1rem;
            border-left: 4px solid var(--primary);
            margin-top: 1rem;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <h1>Digital Day <span style="color: var(--primary)">Console</span></h1>
            </div>
            <div class="game-id" id="gameId">----</div>
        </header>

        <div class="grid">
            <main>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-val" id="playerCount">0</span>
                        <span class="stat-label">Joueurs</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val" id="currentQuestionNum">-</span>
                        <span class="stat-label">Progression</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val" id="topScore">0</span>
                        <span class="stat-label">Top Score</span>
                    </div>
                </div>

                <div class="card">
                    <h2 style="margin-bottom: 1.5rem;">Contrôles du Direct</h2>
                    <div class="controls">
                        <button class="btn btn-primary" id="startBtn" onclick="startQuiz()">🎬 Lancer le Quiz</button>
                        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>⏩ Question Suivante</button>
                        <button class="btn btn-danger" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
                    </div>

                    <div id="currentQuestionInfo" style="display: none;">
                        <h3 class="stat-label">Question en cours</h3>
                        <div id="questionDetails" class="q-preview"></div>
                    </div>

                    <div id="qrSection" class="qr-section">
                        <p style="color: black; font-weight: 800; margin-bottom: 1rem; font-size: 0.75rem; text-transform: uppercase;">QR Code d'accès</p>
                        <!-- QR Injected -->
                    </div>
                </div>
            </main>

            <aside>
                <div class="card" style="margin-bottom: 2rem;">
                    <h2 class="stat-label">Classement</h2>
                    <div id="leaderboardList" class="lb-list"></div>
                </div>

                <div class="card">
                    <h2 class="stat-label">Joueurs (Live)</h2>
                    <div id="playersList" class="player-list"></div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        let socket;
        let gameId;
        let quizActive = false;

        gameId = window.location.pathname.split('/')[2];
        document.getElementById('gameId').innerText = gameId;

        socket = io();
        socket.emit('join-game', { gameId, pseudo: 'Admin', avatar: '👑' });

        // API Calls
        fetch(`/api/game/${gameId}`).then(res => res.json()).then(data => {
            document.getElementById('playerCount').innerText = data.playerCount;
            if (data.gameActive) {
                quizActive = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('nextBtn').disabled = false;
            }
        });

        fetch(`/api/game/create`).then(res => res.json()).then(data => {
            if (data.qr) {
                document.getElementById('qrSection').innerHTML = `<img src="${data.qr}" alt="QR"><p style="color: #64748b; font-size: 0.7rem; margin-top: 1rem;">${data.url}</p>`;
            }
        });

        // Socket Events
        socket.on('players-update', (players) => {
            document.getElementById('playerCount').innerText = players.length;
            const html = players.map(p => `<div class="row-item"><span>${p.avatar} ${p.pseudo}</span><strong>${p.score}</strong></div>`).join('');
            document.getElementById('playersList').innerHTML = html || '<p>Aucun joueur</p>';
        });

        socket.on('leaderboard-update', (scores) => {
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            const html = sorted.slice(0, 10).map(([p, s], i) => `<div class="row-item"><span>#${i+1} ${p}</span><strong>${s}</strong></div>`).join('');
            document.getElementById('leaderboardList').innerHTML = html;
            document.getElementById('topScore').innerText = sorted[0]?.[1] || 0;
        });

        socket.on('new-question', (data) => {
            document.getElementById('currentQuestionNum').innerText = `${data.questionNumber}/${data.totalQuestions}`;
            document.getElementById('questionDetails').innerHTML = `<p><strong>${data.question.text}</strong></p><p style="font-size: 0.8rem; margin-top: 0.5rem; opacity: 0.7;">Réponse: ${data.question.options[data.question.correct]}</p>`;
            document.getElementById('currentQuestionInfo').style.display = 'block';
        });

        function startQuiz() {
            fetch(`/api/admin/${gameId}/start`, { method: 'POST' }).then(() => {
                quizActive = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('nextBtn').disabled = false;
            });
        }

        function nextQuestion() {
            fetch(`/api/admin/${gameId}/next-question`, { method: 'POST' }).then(res => res.json()).then(data => {
                if (data.finished) document.getElementById('nextBtn').disabled = true;
            });
        }

        function resetQuiz() {
            if (confirm('Réinitialiser la partie ?')) {
                fetch(`/api/admin/${gameId}/reset`, { method: 'POST' }).then(() => location.reload());
            }
        }
    </script>
</body>
</html>
