<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Contrôle du Quiz</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .controls {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .current-question {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .question-info {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
        }

        .players-list {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .player-item .avatar {
            font-size: 24px;
        }

        .leaderboard {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .leaderboard-item .rank {
            font-weight: bold;
            color: #667eea;
        }

        .qr-code {
            text-align: center;
            margin: 20px 0;
        }

        .qr-code img {
            max-width: 200px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Administration du Quiz</h1>
            <p>Contrôle en temps réel - ID: <strong id="gameId"></strong></p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>👥 Joueurs connectés</h3>
                <div class="value" id="playerCount">0</div>
            </div>
            <div class="stat-card">
                <h3>📊 Question en cours</h3>
                <div class="value" id="currentQuestionNum">-</div>
            </div>
            <div class="stat-card">
                <h3>⭐ Meilleur score</h3>
                <div class="value" id="topScore">0</div>
            </div>
        </div>

        <div class="controls">
            <h2>🎛️ Contrôles</h2>
            <div class="button-group">
                <button id="startBtn" onclick="startQuiz()">🎬 Démarrer le quiz</button>
                <button id="nextBtn" onclick="nextQuestion()" disabled>⏩ Question suivante</button>
                <button id="resetBtn" onclick="resetQuiz()" class="danger">🔄 Réinitialiser</button>
            </div>

            <div id="qrSection" class="qr-code"></div>

            <div id="currentQuestionInfo" class="current-question" style="display: none;">
                <h3>📝 Question actuelle</h3>
                <div id="questionDetails" class="question-info"></div>
            </div>
        </div>

        <div class="players-list">
            <h2>👥 Joueurs connectés</h2>
            <div id="playersList"></div>
        </div>

        <div class="leaderboard">
            <h2>🏆 Classement en direct</h2>
            <div id="leaderboardList"></div>
        </div>
    </div>

    <script>
        let socket;
        let gameId;
        let quizActive = false;
        let currentQuestionIndex = -1;

        gameId = window.location.pathname.split('/')[2];
        document.getElementById('gameId').innerText = gameId;

        // Charger les informations de la partie
        fetch(`/api/game/${gameId}`)
            .then(res => res.json())
            .then(data => {
                updateStats(data.playerCount);
                if (data.gameActive) {
                    quizActive = true;
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('nextBtn').disabled = false;
                }
            });

        // Récupérer le QR code
        fetch(`/api/game/create`)
            .then(res => res.json())
            .then(data => {
                if (data.qr) {
                    document.getElementById('qrSection').innerHTML = `
                        <h3>📱 QR Code pour les joueurs</h3>
                        <img src="${data.qr}" alt="QR Code">
                        <p>Ou scannent : ${data.url}</p>
                    `;
                }
            });

        // Connexion WebSocket pour les mises à jour en temps réel
        socket = io();
        socket.emit('join-game', { gameId, pseudo: 'Admin', avatar: '👑' });

        socket.on('players-update', (players) => {
            updatePlayersList(players);
            updateStats(players.length);
        });

        socket.on('leaderboard-update', (scores) => {
            updateLeaderboard(scores);
            const topScore = Object.values(scores).sort((a,b) => b - a)[0] || 0;
            document.getElementById('topScore').innerText = topScore;
        });

        socket.on('new-question', (data) => {
            currentQuestionIndex = data.questionNumber;
            document.getElementById('currentQuestionNum').innerText = `${data.questionNumber}/${data.totalQuestions}`;
            displayCurrentQuestion(data.question);
        });

        socket.on('quiz-end', (data) => {
            alert(`Quiz terminé !\nTop 3 :\n${data.top3.map(([p, s], i) => `${i+1}. ${p}: ${s} pts`).join('\n')}`);
            document.getElementById('nextBtn').disabled = true;
            quizActive = false;
        });

        function startQuiz() {
            fetch(`/api/admin/${gameId}/start`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        quizActive = true;
                        document.getElementById('startBtn').disabled = true;
                        document.getElementById('nextBtn').disabled = false;
                        showNotification('Quiz démarré !');
                    }
                });
        }

        function nextQuestion() {
            if (!quizActive) {
                showNotification('Le quiz n\'est pas encore démarré', 'error');
                return;
            }
            
            fetch(`/api/admin/${gameId}/next-question`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.finished) {
                        showNotification('Quiz terminé !');
                        document.getElementById('nextBtn').disabled = true;
                    } else if (data.success) {
                        showNotification('Question suivante lancée !');
                    }
                });
        }

        function resetQuiz() {
            if (confirm('Êtes-vous sûr de vouloir réinitialiser le quiz ? Toutes les données seront perdues.')) {
                fetch(`/api/admin/${gameId}/reset`, { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            location.reload();
                        }
                    });
            }
        }

        function displayCurrentQuestion(question) {
            const html = `
                <p><strong>${question.text}</strong></p>
                <ul style="margin-top: 10px; margin-left: 20px;">
                    ${question.options.map((opt, idx) => `<li>${String.fromCharCode(65+idx)}. ${opt} ${idx === question.correct ? '✅' : ''}</li>`).join('')}
                </ul>
                <p>⏱️ Temps: ${question.timeLimit}s | ⭐ Points: ${question.points}</p>
            `;
            document.getElementById('questionDetails').innerHTML = html;
            document.getElementById('currentQuestionInfo').style.display = 'block';
        }

        function updatePlayersList(players) {
            const html = players.map(player => `
                <div class="player-item">
                    <div>
                        <span class="avatar">${player.avatar}</span>
                        <strong>${player.pseudo}</strong>
                    </div>
                    <div>⭐ ${player.score} pts</div>
                </div>
            `).join('');
            
            document.getElementById('playersList').innerHTML = html || '<p>Aucun joueur connecté</p>';
        }

        function updateLeaderboard(scores) {
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            const html = sorted.map(([pseudo, score], idx) => `
                <div class="leaderboard-item">
                    <span class="rank">${idx + 1}</span>
                    <span>${pseudo}</span>
                    <span>⭐ ${score} pts</span>
                </div>
            `).join('');
            
            document.getElementById('leaderboardList').innerHTML = html || '<p>Aucun score pour le moment</p>';
        }

        function updateStats(playerCount) {
            document.getElementById('playerCount').innerText = playerCount;
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'error' ? '#dc3545' : '#28a745'};
                color: white;
                padding: 15px 20px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                z-index: 1000;
                animation: slideIn 0.5s ease-out;
            `;
            notification.innerHTML = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // Ajouter l'animation CSS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
