<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Day - Mission Control</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --bg: #030712;
            --surface: #0f172a;
            --border: rgba(255, 255, 255, 0.08);
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Mission Control Background Grid */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        header {
            padding: 1.5rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.4rem 0.8rem;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 2rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 1.5rem;
            padding: 1.5rem;
            flex: 1;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
        }

        /* Stats Cards */
        .stats-strip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 1rem;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 2px;
            background: var(--accent);
            opacity: 0.3;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.25rem;
            font-weight: 700;
            display: block;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 0.1em;
        }

        /* Control Center */
        .control-area {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 1.25rem;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn:hover:not(:disabled) {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-danger { color: #f87171; }
        .btn-danger:hover { background: #f87171; color: white; border-color: #f87171; box-shadow: 0 0 20px rgba(248, 113, 113, 0.4); }

        /* Question Preview */
        .q-monitor {
            background: #020617;
            border: 1px solid var(--accent);
            padding: 1.5rem;
            border-radius: 0.75rem;
            position: relative;
        }

        .q-monitor::before {
            content: 'LIVE MONITOR';
            position: absolute;
            top: -10px; left: 20px;
            background: var(--bg);
            padding: 0 10px;
            font-size: 0.6rem;
            font-weight: 900;
            color: var(--accent);
        }

        .q-text {
            font-size: 1.125rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        /* Feed / Lists */
        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .feed-item {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
        }

        .feed-item:last-child { border: none; }

        .tag {
            padding: 0.2rem 0.5rem;
            border-radius: 0.4rem;
            font-size: 0.65rem;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .main-grid { grid-template-columns: 1fr; }
            .panel { height: 400px; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <h1 style="font-size: 1rem; letter-spacing: 0.1em; font-weight: 900;">
                DIGITAL <span style="color: var(--accent)">COMMAND</span>
            </h1>
            <div id="gameIdDisplay" class="tag" style="background: var(--accent); color: white; padding: 0.4rem 1rem;">----</div>
        </div>
        <div class="status-badge">
            <div class="status-dot"></div>
            System Active
        </div>
    </header>

    <div class="main-grid">
        <!-- Sidebar Left: Players -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">Operations Network</span>
                <span id="pCountBadge" class="tag">0 UNITS</span>
            </div>
            <div class="feed" id="playersList">
                <p style="text-align: center; color: var(--text-muted); margin-top: 2rem;">Searching for signals...</p>
            </div>
        </div>

        <!-- Center: Control -->
        <div class="control-center">
            <div class="stats-strip">
                <div class="stat-card">
                    <span class="stat-value" id="statPlayers">0</span>
                    <span class="stat-label">Active Nodes</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="statProg">-</span>
                    <span class="stat-label">Mission Progress</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="statTop">0</span>
                    <span class="stat-label">Peak Efficiency</span>
                </div>
            </div>

            <div class="panel" style="padding: 2rem;">
                <h2 class="panel-title" style="margin-bottom: 2rem;">Primary Directives</h2>
                
                <div class="control-area">
                    <div class="action-grid">
                        <button class="btn" id="startBtn" onclick="startQuiz()">⚡ INITIALIZE MISSION</button>
                        <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>▶️ FORWARD DATA</button>
                    </div>
                    
                    <div id="qMonitor" class="q-monitor" style="display: none;">
                        <div class="q-text" id="qTextDisplay">Waiting for directive...</div>
                        <div id="qOptionsDisplay" style="display: flex; gap: 0.5rem; flex-wrap: wrap;"></div>
                    </div>

                    <div style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 2rem;">
                        <button class="btn btn-danger" onclick="resetQuiz()">⚠️ EMERGENCY RESET</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar Right: Ranking -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">Efficiency Ranking</span>
            </div>
            <div class="feed" id="lbList">
                <p style="text-align: center; color: var(--text-muted); margin-top: 2rem;">Data pending...</p>
            </div>
            
            <div id="qrArea" style="padding: 1.5rem; border-top: 1px solid var(--border); text-align: center;">
                <span class="panel-title" style="margin-bottom: 1rem; display: block;">Access Vector</span>
                <div id="qrImg" style="background: white; padding: 10px; border-radius: 0.5rem; display: inline-block;"></div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let gameId;

        gameId = window.location.pathname.split('/')[2];
        document.getElementById('gameIdDisplay').innerText = gameId;

        socket = io();
        socket.emit('join-game', { gameId, pseudo: 'Admin', avatar: '👑' });

        // Initial Data
        fetch(`/api/game/${gameId}`).then(res => res.json()).then(data => {
            updateStatsUI(data);
            if (data.gameActive) {
                document.getElementById('startBtn').disabled = true;
                document.getElementById('nextBtn').disabled = false;
            }
        });

        fetch(`/api/game/create`).then(res => res.json()).then(data => {
            if (data.qr) {
                document.getElementById('qrImg').innerHTML = `<img src="${data.qr}" style="width: 120px; display: block;">`;
            }
        });

        // Socket Events
        socket.on('players-update', (players) => {
            document.getElementById('statPlayers').innerText = players.length;
            document.getElementById('pCountBadge').innerText = `${players.length} UNITS`;
            const html = players.map(p => `
                <div class="feed-item">
                    <span>${p.avatar} ${p.pseudo}</span>
                    <span class="tag">ID: ${p.id.substring(0,4)}</span>
                </div>
            `).join('');
            document.getElementById('playersList').innerHTML = html || '<p style="text-align: center; color: var(--text-muted); margin-top: 2rem;">Waiting for signals...</p>';
        });

        socket.on('leaderboard-update', (scores) => {
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            const html = sorted.slice(0, 10).map(([p, s], i) => `
                <div class="feed-item">
                    <span>#${i+1} ${p}</span>
                    <span style="font-weight: 800; color: var(--accent);">${s}</span>
                </div>
            `).join('');
            document.getElementById('lbList').innerHTML = html;
            document.getElementById('statTop').innerText = sorted[0]?.[1] || 0;
        });

        socket.on('new-question', (data) => {
            document.getElementById('statProg').innerText = `${data.questionNumber}/${data.totalQuestions}`;
            document.getElementById('qTextDisplay').innerText = data.question.text;
            document.getElementById('qMonitor').style.display = 'block';
            
            const optsHtml = data.question.options.map((o, i) => `
                <span class="tag" style="${i === data.question.correct ? 'background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981;' : ''}">${o}</span>
            `).join('');
            document.getElementById('qOptionsDisplay').innerHTML = optsHtml;
        });

        function startQuiz() {
            fetch(`/api/admin/${gameId}/start`, { method: 'POST' }).then(() => {
                document.getElementById('startBtn').disabled = true;
                document.getElementById('nextBtn').disabled = false;
            });
        }

        function nextQuestion() {
            fetch(`/api/admin/${gameId}/next-question`, { method: 'POST' }).then(res => res.json()).then(data => {
                if (data.finished) document.getElementById('nextBtn').disabled = true;
            });
        }

        function resetQuiz() {
            if (confirm('TERMINATE ALL PROCESSES?')) {
                fetch(`/api/admin/${gameId}/reset`, { method: 'POST' }).then(() => location.reload());
            }
        }

        function updateStatsUI(data) {
            document.getElementById('statPlayers').innerText = data.playerCount;
            document.getElementById('pCountBadge').innerText = `${data.playerCount} UNITS`;
        }
    </script>
</body>
</html>
